<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Smart Traffic — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        #map { height: 420px; border-radius: 0.5rem; }
        .stat-card { border-left: 4px solid #0d6efd; }
        .phase-green { background: #198754; }
        .phase-red { background: #dc3545; }
        .phase-yellow { background: #ffc107; color: #212529; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
    <div class="container-fluid">
        <span class="navbar-brand">Smart Traffic</span>
        <div class="navbar-nav">
            <a class="nav-link active" href="/dashboard">Dashboard</a>
            <a class="nav-link" href="/admin">Admin</a>
            <a class="nav-link" href="/login">Login</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row g-3 mb-3">
        <div class="col-md-4">
            <div class="card stat-card shadow-sm">
                <div class="card-body">
                    <h6 class="text-muted">Intersections</h6>
                    <h2 id="stat-intersections">—</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card shadow-sm border-start border-info">
                <div class="card-body">
                    <h6 class="text-muted">Avg green (s)</h6>
                    <h2 id="stat-avg-green">—</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card shadow-sm border-start border-danger">
                <div class="card-body">
                    <h6 class="text-muted">Emergency nodes</h6>
                    <h2 id="stat-emergency">—</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header">Live map</div>
                <div class="card-body p-2">
                    <div id="map"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card shadow-sm mb-3">
                <div class="card-header">Hourly traffic (30d peak)</div>
                <div class="card-body">
                    <canvas id="chartPeak" height="200"></canvas>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="card-header">Top congested</div>
                <div class="card-body">
                    <canvas id="chartTop" height="220"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
    const map = L.map('map').setView([37.7745, -122.4185], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    const markers = {};

    function phaseClass(phase) {
        if (phase === 'GREEN') return 'phase-green';
        if (phase === 'YELLOW') return 'phase-yellow';
        return 'phase-red';
    }

    function updateMarkers(signals) {
        signals.forEach(s => {
            const radius = 8 + Math.min(s.vehicleCount / 3, 28);
            const color = s.phase === 'GREEN' ? '#198754' : s.phase === 'YELLOW' ? '#ffc107' : '#dc3545';
            if (markers[s.id]) {
                map.removeLayer(markers[s.id]);
            }
            const circle = L.circleMarker([s.latitude, s.longitude], {
                radius: radius,
                color: '#333',
                weight: 2,
                fillColor: color,
                fillOpacity: 0.85
            });
            circle.bindPopup(`<strong>${s.name}</strong><br/>Phase: ${s.phase}<br/>Vehicles: ${s.vehicleCount}<br/>Green/Red: ${s.greenDuration}s / ${s.redDuration}s`);
            circle.addTo(map);
            markers[s.id] = circle;
        });
    }

    fetch('/api/signals/live').then(r => r.json()).then(updateMarkers);

    const socket = new SockJS('/ws');
    const stomp = Stomp.over(socket);
    stomp.debug = null;
    stomp.connect({}, function () {
        stomp.subscribe('/topic/signals', function (msg) {
            const data = JSON.parse(msg.body);
            updateMarkers(data);
        });
        stomp.subscribe('/topic/stats', function (msg) {
            const s = JSON.parse(msg.body);
            document.getElementById('stat-intersections').textContent = s.totalIntersections ?? '—';
            document.getElementById('stat-avg-green').textContent = (s.averageGreenSeconds != null) ? s.averageGreenSeconds.toFixed(1) : '—';
            document.getElementById('stat-emergency').textContent = s.activeEmergencies ?? '—';
        });
        stomp.subscribe('/topic/emergency', function (msg) {
            console.warn('Emergency', msg.body);
        });
    });

    let chartPeak, chartTop;
    fetch('/api/analytics/peak-hours').then(r => r.json()).then(rows => {
        const ctx = document.getElementById('chartPeak');
        chartPeak = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: rows.map(x => x.hour + ':00'),
                datasets: [{label: 'Events', data: rows.map(x => x.eventCount), backgroundColor: '#0d6efd'}]
            },
            options: {plugins: {legend: {display: false}}, scales: {y: {beginAtZero: true}}}
        });
    });
    fetch('/api/analytics/top-congested?limit=5').then(r => r.json()).then(rows => {
        const ctx = document.getElementById('chartTop');
        chartTop = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: rows.map(x => x.name),
                datasets: [{label: 'Avg vehicles', data: rows.map(x => x.averageVehicleCount), backgroundColor: '#6f42c1'}]
            },
            options: {indexAxis: 'y', plugins: {legend: {display: false}}, scales: {x: {beginAtZero: true}}}
        });
    });
</script>
</body>
</html>
