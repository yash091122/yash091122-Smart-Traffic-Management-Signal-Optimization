<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login — Smart Traffic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container" style="max-width: 420px;">
    <div class="card shadow">
        <div class="card-body p-4">
            <h1 class="h4 mb-3">Sign in</h1>
            <p class="text-muted small">Admin: <code>admin</code> / <code>adminpass</code> · Viewer JWT via API only</p>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" autocomplete="username"/>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" autocomplete="current-password"/>
            </div>
            <div id="err" class="alert alert-danger d-none"></div>
            <button type="button" id="btn" class="btn btn-primary w-100">Login</button>
            <a href="/dashboard" class="btn btn-link w-100 mt-2">Back to dashboard</a>
        </div>
    </div>
</div>
<script>
    document.getElementById('btn').onclick = async () => {
        const err = document.getElementById('err');
        err.classList.add('d-none');
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        if (!res.ok) {
            err.textContent = 'Invalid credentials';
            err.classList.remove('d-none');
            return;
        }
        const data = await res.json();
        localStorage.setItem('st_token', data.token);
        localStorage.setItem('st_role', data.role);
        window.location.href = '/admin';
    };
</script>
</body>
</html>
